repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.7
    hooks:
      - id: ruff
        args: [--fix]
        files: ^backend/
      - id: ruff-format
        files: ^backend/

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.15.0
    hooks:
      - id: mypy
        files: ^backend/
        args: [--config-file=backend/mypy.ini]
        additional_dependencies:
          - pydantic==2.11.3
          - cachetools==5.5.2
          - types-cachetools
          - fastapi==0.115.12
