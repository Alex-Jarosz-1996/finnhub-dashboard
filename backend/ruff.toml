[lint]
select = [
    "E",   # pycodestyle errors
    "F",   # pyflakes
    "I",   # isort
    "UP",  # pyupgrade
    "B",   # flake8-bugbear
    "RUF", # ruff-specific
]
ignore = [
    "B008", # Depends() in argument defaults is the standard FastAPI pattern
]

[format]
quote-style = "double"
indent-style = "space"
